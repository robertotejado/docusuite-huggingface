{% extends "base.html" %}
{% block content %}
    <h1>{% if doc_actual %}✏️ Editando: {{ doc_actual['titulo'] }}{% else %}📝 Redactar Nuevo Documento{% endif %}</h1>

    <form method="POST" action="{{ url_for('main.editor') }}" style="background: var(--sidebar-bg); padding: 20px; border-radius: 8px;" id="formularioDocumento">
        
        {% if doc_actual %}
            <input type="hidden" name="id_doc" value="{{ doc_actual['id'] }}">
        {% endif %}

        <label>Asignar a Proyecto:</label><br>
        <select name="id_proyecto" required style="width: 100%; padding: 8px; margin: 10px 0;">
            {% for p in proyectos %}
                <option value="{{ p['id'] }}" 
                    {% if doc_actual and p['id'] == doc_actual['id_proyecto'] %}selected{% endif %}>
                    [{{ p['tipo'] }}] {{ p['nombre'] }}
                </option>
            {% else %}
                <option value="" disabled>No hay proyectos. Crea uno en Gestión de Proyectos.</option>
            {% endfor %}
        </select><br>
        
        <label>Título del Documento:</label><br>
        <input type="text" name="titulo" required style="width: 97%; padding: 8px; margin: 10px 0;" 
               value="{% if doc_actual %}{{ doc_actual['titulo'] }}{% endif %}"><br>

        <label>Autor / Desarrollado por:</label><br>
        <input type="text" name="autor" placeholder="Ej: Roberto Tejado" style="width: 97%; padding: 8px; margin: 10px 0;" 
               value="{% if doc_actual %}{{ doc_actual['autor'] or '' }}{% endif %}"><br>
        
        <label>Contenido del Documento:</label><br>
        <textarea id="tinymce-editor" name="d" rows="20" style="width: 100%;">
{% if doc_actual %}{{ doc_actual['contenido_texto'] | safe }}{% endif %}
        </textarea><br>
        
      <button type="button" class="btn" onclick="enviarSeguro()" style="font-size: 16px; padding: 10px 20px;">
    {% if doc_actual %}Actualizar Documentación{% else %}Guardar Nueva Documentación{% endif %}
</button>

<script>
function enviarSeguro() {
    console.log("Iniciando envío seguro...");
    
    // 1. Sincronizar TinyMCE
    tinymce.triggerSave();
    
    const editor = document.getElementById('tinymce-editor');
    const contenidoOriginal = editor.value;

    // 2. Invertir el texto respetando los Emojis (¡El cambio clave para Firefox!)
    const contenidoInvertido = Array.from(contenidoOriginal).reverse().join("");
    
    // 3. Codificación robusta
    // Usamos encodeURIComponent directamente para que btoa() trague acentos y símbolos
    const contenidoBase64 = btoa(encodeURIComponent(contenidoInvertido));

    // 4. Preparar el formulario para el backend y saltar el WAF
    const formulario = document.getElementById('formularioDocumento');
    
    // Verificamos si existe el campo oculto 'd' que espera Python, si no, lo creamos
    let inputDisfrazado = document.getElementById('input_disfrazado_d');
    if (!inputDisfrazado) {
        inputDisfrazado = document.createElement('input');
        inputDisfrazado.type = 'hidden';
        inputDisfrazado.name = 'd'; // Python hace: request.form.get('d')
        inputDisfrazado.id = 'input_disfrazado_d';
        formulario.appendChild(inputDisfrazado);
    }
    
    // Metemos el contenido ofuscado en el campo 'd'
    inputDisfrazado.value = contenidoBase64;

    // ¡VACIAR EL CAMPO ORIGINAL! (Así el WAF de Render no ve etiquetas HTML)
    editor.value = '';

    console.log("Contenido disfrazado, enviando...");
    
    // 5. Enviar el formulario
    formulario.submit();
}
</script>
        {% if doc_actual %}
            <a href="{{ url_for('main.gestion_documentos') }}" class="btn" style="background: #64748b; margin-left: 10px;">Cancelar</a>
        {% endif %}
    </form>

    <!--<script src="https://cdn.tiny.cloud/1/tsrsg1slvb6ev00jqizigk5fhdctocxsess5rzkwkz0q1ntv/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
  -->
    
<script>
        // CONFIGURACIÓN UNIFICADA DE TINYMCE
        tinymce.init({
            selector: '#tinymce-editor', // ID correcto corregido
            plugins: 'codesample image code table lists link media',
            toolbar: 'undo redo | formatselect | bold italic | alignleft aligncenter alignright | codesample code | bullist numlist | link image table',
            
            // Configuración de Lenguajes para CodeSample
            codesample_languages: [
                { text: 'Bash', value: 'bash' },
                { text: 'Docker', value: 'docker' },
                { text: 'YAML', value: 'yaml' },
                { text: 'JSON', value: 'json' },
                { text: 'Nginx', value: 'nginx' },
                { text: 'Python', value: 'python' },
                { text: 'SQL', value: 'sql' },
                { text: 'JavaScript', value: 'javascript' },
                { text: 'HTML/XML', value: 'markup' },
                { text: 'CSS', value: 'css' }
            ],

            // Configuraciones de imagen y visual
            images_upload_url: "/upload_attachment",
            automatic_uploads: true,
            file_picker_types: 'image',
            height: 600,
            menubar: false,
            extended_valid_elements: 'pre[*],code[*]',
            
            // Modo Oscuro Dinámico
            skin: (document.documentElement.getAttribute('data-theme') === 'dark' ? 'oxide-dark' : 'oxide'),
            content_css: (document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default')
        });

        // Lógica para alternar Modo Claro/Oscuro
        function toggleTheme() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
            }
            // Recargar el editor para aplicar el nuevo tema (opcional)
            tinymce.remove('#tinymce-editor');
            location.reload(); 
        }
    </script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-docker.min.js"></script>
